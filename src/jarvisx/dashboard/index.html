<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis X — OS Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { 
            background-color: #000000; 
            color: #ffffff;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Ambient Glow based on personality/state */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 45vw;
            height: 45vw;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 65%);
            z-index: 0;
            pointer-events: none;
            transition: all 1.5s ease-in-out;
            filter: blur(40px);
        }

        body.state-listening .ambient-glow { background: radial-gradient(circle, rgba(147, 197, 253, 0.08) 0%, rgba(0,0,0,0) 65%); }
        body.state-thinking .ambient-glow { background: radial-gradient(circle, rgba(216, 180, 254, 0.08) 0%, rgba(0,0,0,0) 65%); }
        body.state-speaking .ambient-glow { background: radial-gradient(circle, rgba(167, 243, 208, 0.08) 0%, rgba(0,0,0,0) 65%); }
        body.state-working .ambient-glow { background: radial-gradient(circle, rgba(251, 146, 60, 0.06) 0%, rgba(0,0,0,0) 65%); }

        /* Main Container */
        .core-interface {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 800px;
        }

        /* Voice Waveform */
        .waveform {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 64px;
            margin-bottom: 2.5rem;
        }
        .bar {
            width: 4px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 9999px;
            transition: height 0.1s ease, background-color 0.5s ease;
        }

        /* Minimal Transcript */
        .transcript-container {
            width: 100%;
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            text-align: center;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
            overflow: hidden;
            gap: 12px;
        }
        .transcript-line {
            opacity: 0.5;
            transition: opacity 0.5s ease, transform 0.3s ease;
            font-size: 1.125rem;
            font-weight: 300;
            color: #9ca3af;
            letter-spacing: 0.01em;
        }
        .transcript-line:last-child {
            opacity: 1;
            font-size: 1.25rem;
            font-weight: 400;
            color: #ffffff;
            transform: translateY(0);
        }

        /* Progressive Disclosure Panels */
        .disclosure-panel {
            position: fixed;
            background: rgba(12, 12, 12, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 24px;
            color: #9ca3af;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 20;
        }
        .disclosure-panel.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Specific Panel Positioning */
        #panel-agents { top: 40px; right: 40px; width: 320px; transform: translateX(30px); }
        #panel-agents.active { transform: translateX(0); }
        
        #panel-diagnostics { top: 40px; left: 40px; width: 320px; transform: translateX(-30px); }
        #panel-diagnostics.active { transform: translateX(0); }

        #panel-workspace { bottom: 40px; left: 50%; transform: translateX(-50%) translateY(30px); width: 80%; max-width: 1000px; height: 35vh; }
        #panel-workspace.active { transform: translateX(-50%) translateY(0); }

        .panel-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #6b7280;
            margin-bottom: 20px;
            font-weight: 600;
        }

    </style>
</head>
<body class="state-sleeping">

    <!-- Subtle background pulse mapping to states -->
    <div class="ambient-glow" id="ambient-glow"></div>

    <main class="core-interface">
        
        <!-- Personality Indicator & Current State -->
        <div class="flex flex-col items-center mb-16">
            <h1 id="personality-name" class="text-3xl font-light tracking-wide text-white/90">Alfred</h1>
            <p id="system-state" class="text-xs font-semibold tracking-[0.2em] uppercase text-white/30 mt-4 transition-colors duration-700">Sleeping</p>
        </div>

        <!-- Animated Voice Waveform -->
        <div class="waveform" id="waveform">
            <!-- 15 Bars injected via JS -->
        </div>

        <!-- Floating Transcript -->
        <div class="transcript-container" id="transcript">
            <!-- Simulated initial state -->
        </div>

    </main>

    <!-- PROGRESSIVE DISCLOSURE: AGENTS -->
    <div id="panel-agents" class="disclosure-panel">
        <h2 class="panel-title">Active Workforce</h2>
        <div id="agents-list" class="flex flex-col gap-4 text-sm font-light">
            <p class="text-white/40 italic">No agents deployed.</p>
        </div>
    </div>

    <!-- PROGRESSIVE DISCLOSURE: DIAGNOSTICS -->
    <div id="panel-diagnostics" class="disclosure-panel">
        <h2 class="panel-title">System Diagnostics</h2>
        <div id="diagnostics-list" class="flex flex-col gap-3 text-xs font-light font-mono text-white/60">
            <div class="flex justify-between"><span>Core Threads</span><span class="text-white">Idle</span></div>
            <div class="flex justify-between"><span>Memory Cache</span><span class="text-white">Synced</span></div>
            <div class="flex justify-between"><span>Local Network</span><span class="text-emerald-400">Secure</span></div>
        </div>
    </div>

    <!-- PROGRESSIVE DISCLOSURE: WORKSPACE -->
    <div id="panel-workspace" class="disclosure-panel">
        <h2 class="panel-title flex justify-between items-center">
            <span>Coding Workspace</span>
            <span class="text-indigo-400/70 lowercase font-mono">wt-c09a48d8</span>
        </h2>
        <div id="workspace-content" class="text-sm font-mono font-light h-full overflow-y-auto text-white/70">
            <pre class="bg-black/30 p-4 rounded-lg mt-2 text-xs leading-relaxed border border-white/5">
def check_health():
    return {"status": "healthy"}
            </pre>
        </div>
    </div>

    <script>
        // --- Core State Variables ---
        let currentState = 'sleeping'; // Options: listening, thinking, speaking, working, sleeping
        let activePersonality = 'Alfred';
        
        // --- Waveform Initialization ---
        const waveform = document.getElementById('waveform');
        const numBars = 15;
        const bars = [];
        
        for (let i = 0; i < numBars; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = '4px';
            waveform.appendChild(bar);
            bars.push(bar);
        }

        // --- Waveform Animation Engine ---
        function animateWaveform() {
            bars.forEach((bar, index) => {
                let height = 4;
                if (currentState === 'listening' || currentState === 'speaking') {
                    // Audio reactivity simulation centered around the middle
                    const distanceFromCenter = Math.abs((numBars / 2) - index);
                    const maxPossibleHeight = 64 - (distanceFromCenter * 8);
                    if (maxPossibleHeight > 4) {
                        height = Math.max(4, Math.random() * maxPossibleHeight);
                    }
                } else if (currentState === 'thinking') {
                    // Gentle, slow pulsing sine wave
                    const time = Date.now() / 400;
                    height = 12 + Math.sin(time + (index * 0.4)) * 8;
                } else if (currentState === 'working') {
                    // Erratic computational spikes
                    height = 4 + (Math.random() > 0.8 ? Math.random() * 24 : 0);
                }
                
                bar.style.height = `${height}px`;
                
                // State-based coloration
                if(currentState === 'listening') bar.style.backgroundColor = 'rgba(147, 197, 253, 0.9)'; // Blue
                else if(currentState === 'speaking') bar.style.backgroundColor = 'rgba(255, 255, 255, 1)'; // White
                else if(currentState === 'thinking') bar.style.backgroundColor = 'rgba(216, 180, 254, 0.7)'; // Purple
                else if(currentState === 'working') bar.style.backgroundColor = 'rgba(251, 146, 60, 0.6)'; // Orange
                else bar.style.backgroundColor = 'rgba(255, 255, 255, 0.15)'; // Sleeping
            });
            requestAnimationFrame(animateWaveform);
        }
        animateWaveform();

        // --- Transcript Interface ---
        const transcriptContainer = document.getElementById('transcript');
        function setTranscript(text, isUser = false) {
            const line = document.createElement('div');
            line.className = 'transcript-line';
            line.textContent = text;
            
            // Distinguish user vs system visually
            if(isUser) {
                line.style.color = 'rgba(255,255,255,0.4)';
            }
            
            transcriptContainer.appendChild(line);
            
            // Keep history minimal (max 3 lines) to maintain ambient feel
            while (transcriptContainer.children.length > 3) {
                transcriptContainer.removeChild(transcriptContainer.firstChild);
            }
        }

        // --- State Mutators ---
        function setSystemState(state) {
            currentState = state.toLowerCase();
            document.body.className = `state-${currentState}`;
            
            const stateEl = document.getElementById('system-state');
            stateEl.textContent = currentState;
            
            // Dynamic text coloring based on state
            stateEl.className = "text-xs font-semibold tracking-[0.2em] uppercase mt-4 transition-colors duration-700 ";
            if(currentState === 'listening') stateEl.className += "text-blue-400";
            else if(currentState === 'speaking') stateEl.className += "text-white/80";
            else if(currentState === 'thinking') stateEl.className += "text-purple-400";
            else if(currentState === 'working') stateEl.className += "text-orange-400";
            else stateEl.className += "text-white/30";
        }

        function togglePanel(id, show) {
            const panel = document.getElementById(id);
            if(show) {
                panel.classList.add('active');
            } else {
                panel.classList.remove('active');
            }
        }

        // --- WebSocket Backend Sync ---
        function connectWebSocket() {
            const ws = new WebSocket(`ws://${window.location.hostname || '127.0.0.1'}:8766`);
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'state') {
                    setSystemState(data.state);
                    if (data.personality) {
                        activePersonality = data.personality;
                        document.getElementById('personality-name').textContent = activePersonality;
                    }
                } else if (data.type === 'transcript') {
                    setTranscript(data.text, data.is_user);
                }
            };
            
            ws.onclose = () => {
                setTimeout(connectWebSocket, 3000); // Reconnect on drop
            };
        }
        connectWebSocket();

        // --- Developer Mode ---
        let devModeActive = false;
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && (e.key === 'D' || e.key === 'd')) {
                devModeActive = !devModeActive;
                togglePanel('panel-agents', devModeActive);
                togglePanel('panel-diagnostics', devModeActive);
                togglePanel('panel-workspace', devModeActive);
            }
        });

    </script>
</body>
</html>
