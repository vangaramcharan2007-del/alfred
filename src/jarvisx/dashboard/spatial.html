<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis X — Spatial Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; color: white; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; padding: 20px; }
        .glass-panel { background: rgba(0, 20, 40, 0.6); backdrop-filter: blur(8px); border: 1px solid rgba(0, 255, 255, 0.2); border-radius: 8px; pointer-events: auto; }
        #webcam-container { position: absolute; bottom: 20px; right: 20px; width: 320px; height: 240px; }
        video.input_video { display: none; }
        canvas.output_canvas { width: 100%; height: 100%; border-radius: 8px; transform: scaleX(-1); }
        .hud-text { font-family: monospace; color: #0ff; text-shadow: 0 0 5px #0ff; }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui-layer" class="flex flex-col justify-between">
    <div class="flex justify-between items-start">
        <div class="glass-panel p-4 w-64">
            <h1 class="text-xl font-bold text-cyan-400 mb-2 tracking-widest uppercase">Shadowbroker</h1>
            <p class="text-xs text-cyan-200 opacity-70">Global Threat Monitoring</p>
            <div class="mt-4 border-t border-cyan-800 pt-2">
                <p class="hud-text text-xs" id="status-text">INITIALIZING SENSORS...</p>
                <p class="hud-text text-xs mt-1" id="gesture-text">GESTURE: NONE</p>
            </div>
            <button onclick="window.location.href='/'" class="mt-4 text-xs px-3 py-1 rounded border border-cyan-800 hover:bg-cyan-900 text-cyan-400 transition uppercase w-full">Return to Dashboard</button>
        </div>
    </div>
</div>

<div id="webcam-container" class="glass-panel overflow-hidden pointer-events-auto">
    <video class="input_video"></video>
    <canvas class="output_canvas" width="320" height="240"></canvas>
    <div class="absolute bottom-1 left-2 text-[10px] text-cyan-500 font-mono">OPTICS SECURE</div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- THREE.JS SETUP ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.002);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 300);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;
    controls.enablePan = false;

    // Globe
    const globeGeometry = new THREE.SphereGeometry(100, 64, 64);
    
    // Wireframe material
    const wireframeMaterial = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.15 });
    const edges = new THREE.EdgesGeometry(globeGeometry);
    const globeWireframe = new THREE.LineSegments(edges, wireframeMaterial);
    scene.add(globeWireframe);

    // Inner dark sphere
    const solidMaterial = new THREE.MeshBasicMaterial({ color: 0x000510, transparent: true, opacity: 0.8 });
    const globeSolid = new THREE.Mesh(globeGeometry, solidMaterial);
    scene.add(globeSolid);

    // Add some threat markers (random points on sphere)
    const markers = new THREE.Group();
    for (let i = 0; i < 50; i++) {
        const phi = Math.acos(-1 + (2 * i) / 50);
        const theta = Math.sqrt(50 * Math.PI) * phi;
        
        const r = 101;
        const x = r * Math.cos(theta) * Math.sin(phi);
        const y = r * Math.sin(theta) * Math.sin(phi);
        const z = r * Math.cos(phi);

        const markerGeo = new THREE.BoxGeometry(1, 1, 1);
        const isThreat = Math.random() > 0.8;
        const markerMat = new THREE.MeshBasicMaterial({ 
            color: isThreat ? 0xff0044 : 0x00ff88,
            transparent: true,
            opacity: 0.7
        });
        const marker = new THREE.Mesh(markerGeo, markerMat);
        marker.position.set(x, y, z);
        marker.lookAt(0,0,0);
        markers.add(marker);
    }
    scene.add(markers);

    // Particles
    const particleGeo = new THREE.BufferGeometry();
    const particleCount = 2000;
    const posArray = new Float32Array(particleCount * 3);
    for(let i=0; i < particleCount * 3; i++) {
        posArray[i] = (Math.random() - 0.5) * 800;
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const particleMat = new THREE.PointsMaterial({ size: 1.5, color: 0x00aaff, transparent: true, opacity: 0.5 });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    // Resize handler
    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Animation Loop
    let targetRotationSpeed = 0.5;
    let targetRotationX = 0;
    let targetRotationY = 0;
    
    function animate() {
        requestAnimationFrame(animate);
        
        controls.autoRotateSpeed += (targetRotationSpeed - controls.autoRotateSpeed) * 0.05;
        controls.update();
        
        scene.rotation.y += (targetRotationY - scene.rotation.y) * 0.1;
        scene.rotation.x += (targetRotationX - scene.rotation.x) * 0.1;
        
        particles.rotation.y += 0.0005;
        particles.rotation.x += 0.0002;
        
        renderer.render(scene, camera);
    }
    animate();
    
    document.getElementById('status-text').innerText = "SYSTEMS ONLINE";

    // --- MEDIAPIPE HANDS SETUP ---
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const gestureText = document.getElementById('gesture-text');
    
    let lastX = 0;
    let lastY = 0;
    let swipeCooldown = 0;

    function onResults(results) {
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        if (swipeCooldown > 0) swipeCooldown--;

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            for (const landmarks of results.multiHandLandmarks) {
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00ffff', lineWidth: 2});
                drawLandmarks(canvasCtx, landmarks, {color: '#ff00ff', lineWidth: 1, radius: 2});
                
                // Swipe detection using Index Finger Tip (landmark 8)
                const indexTip = landmarks[8];
                const thumbTip = landmarks[4];
                const currentX = indexTip.x;
                const currentY = indexTip.y;
                
                // Pinch detection (distance between thumb tip and index tip)
                const dist = Math.sqrt(Math.pow(indexTip.x - thumbTip.x, 2) + Math.pow(indexTip.y - thumbTip.y, 2) + Math.pow(indexTip.z - thumbTip.z, 2));
                const isPinching = dist < 0.05;
                
                if (isPinching) {
                    gestureText.innerText = "GESTURE: PINCH (DRAG TO ROTATE)";
                    gestureText.style.color = "#ff00ff";
                    
                    if (lastX !== 0) {
                        const deltaX = currentX - lastX;
                        const deltaY = currentY - (lastY || currentY);
                        
                        targetRotationY += deltaX * 5.0;
                        targetRotationX += deltaY * 5.0;
                    }
                } else if (lastX !== 0 && swipeCooldown === 0) {
                    const deltaX = currentX - lastX;
                    if (Math.abs(deltaX) > 0.08) { // Threshold for swipe
                        if (deltaX > 0) {
                            gestureText.innerText = "GESTURE: SWIPE LEFT (DISMISS)";
                            gestureText.style.color = "#ff0044";
                            triggerSwipeEffect();
                        } else {
                            gestureText.innerText = "GESTURE: SWIPE RIGHT (NEXT)";
                            gestureText.style.color = "#00ff88";
                            triggerSwipeEffect();
                        }
                        swipeCooldown = 30; // ~1 second cooldown at 30fps
                        
                        setTimeout(() => {
                            gestureText.innerText = "GESTURE: TRACKING";
                            gestureText.style.color = "#0ff";
                        }, 1000);
                    }
                }
                lastX = currentX;
                lastY = currentY;
            }
        } else {
            lastX = 0;
            lastY = 0;
            if (gestureText.innerText !== "GESTURE: NONE" && swipeCooldown === 0) {
                 gestureText.innerText = "GESTURE: NONE";
                 gestureText.style.color = "#0ff";
            }
        }
        canvasCtx.restore();
    }
    
    function triggerSwipeEffect() {
        // Spin globe faster temporarily
        targetRotationSpeed = 20.0;
        setTimeout(() => {
            targetRotationSpeed = 0.5;
        }, 500);
        
        // Change wireframe color momentarily
        wireframeMaterial.color.setHex(0xff00ff);
        setTimeout(() => {
            wireframeMaterial.color.setHex(0x00ffff);
        }, 300);
    }

    const hands = new Hands({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});
    
    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });
    
    hands.onResults(onResults);

    const camera_utils = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 320,
        height: 240
    });
    camera_utils.start();
</script>
</body>
</html>
